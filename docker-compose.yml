services:
  postgres:
    image: postgres:16-alpine
    container_name: platform_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: financial_platform
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: platform_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d financial_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://platform_user:platform_pass@postgres:5432/financial_platform
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRY: 8h
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_NAME: منصة إدارة الحركة المالية
      MAX_FILE_SIZE_MB: 50
      SESSION_TIMEOUT_MINUTES: 30
      MAX_FAILED_LOGINS: 5
      LOCKOUT_MINUTES: 30
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
